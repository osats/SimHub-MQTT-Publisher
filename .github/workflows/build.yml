name: Build SimHub MQTT Publisher

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild SimHubMQTTPublisher.sln /p:Configuration=Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: simhub-mqtt-plugin
          path: bin/Release/*.dll
