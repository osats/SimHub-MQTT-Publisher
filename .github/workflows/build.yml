name: Build SimHub MQTT Publisher

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore SimHubMQTTPublisher.sln

      - name: Build Release
        run: msbuild SimHubMQTTPublisher.sln /p:Configuration=Release

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: simhub-mqtt-publisher-build
          path: |
            **\bin\Release\*.dll
            **\bin\Release\*.pdb
